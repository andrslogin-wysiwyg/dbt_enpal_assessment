version: 2

models:
  - name: rep_sales_funnel_monthly
    description: '{{ doc("rep_sales_funnel_monthly") }}'
    config:
      meta:
        owner: analytics_engineering
        model_criticality: high
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [month, funnel_step]
    columns:
      - name: month
        description: '{{ doc("pd_rep_month") }}'
        tests: [not_null]
      - name: kpi_name
        description: '{{ doc("pd_rep_kpi_name") }}'
        tests: [not_null]
      - name: funnel_step
        description: '{{ doc("pd_rep_funnel_step") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['1', '2', '2.1', '3', '3.1', '4', '5', '6', '7', '8', '9']
      - name: deals_count
        description: '{{ doc("pd_rep_deals_count") }}'
        tests: [not_null]
